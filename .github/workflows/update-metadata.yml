name: Update Meta Data

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-counts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch Download Counts and Update JSON
        shell: pwsh
        run: |
          $repoJsonPath = "repo.json"
          $repoJson = Get-Content $repoJsonPath | ConvertFrom-Json
          
          $headers = @{
              Authorization = "token ${{ secrets.GITHUB_TOKEN }}"
              "User-Agent"  = "github-actions"
          }
          
          foreach ($plugin in $repoJson) {
              if ($plugin.RepoUrl -match "github.com/([^/]+/[^/]+)") {
                  $repoPath = $Matches[1]
                  Write-Host "Fetching downloads for $repoPath..."
          
                  try {
                      $totalDownloads = 0
                      $page = 1
          
                      while ($true) {
                          $url = "https://api.github.com/repos/$repoPath/releases?per_page=100&page=$page"
                          $releases = Invoke-RestMethod -Uri $url -Headers $headers
          
                          if (-not $releases) { break }
          
                          $totalDownloads += (
                              $releases.assets |
                              Where-Object { $_ } |
                              Measure-Object download_count -Sum
                          ).Sum
          
                          $page++
                      }
          
                      Write-Host "Total downloads: $totalDownloads"
                      $plugin.DownloadCount = $totalDownloads
                  }
                  catch {
                      Write-Warning "Could not fetch data for $repoPath"
                  }
              }
          }
          
          $repoJson | ConvertTo-Json -Depth 100 -AsArray | Set-Content $repoJsonPath

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add repo.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update download counts [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
